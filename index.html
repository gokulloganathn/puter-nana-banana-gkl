<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nano Banana Image Generator</title>
    <style>
      :root {
        --bg: #0f1724;
        --panel: #0b1220;
        --muted: #94a3b8;
        --accent: #7c5cff;
        --glass: rgba(255, 255, 255, 0.04);
        --card: #0b1228;
        --btn: #3b82f6;
      }
      html,
      body {
        height: 100%;
      }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial;
        background: linear-gradient(180deg, #071028 0%, #07192b 60%);
        color: #e6eef8;
        -webkit-font-smoothing: antialiased;
      }

      .app {
        max-width: 1100px;
        margin: 28px auto;
        padding: 20px;
      }

      .topbar {
        display: flex;
        align-items: center;
        gap: 18px;
        margin-bottom: 18px;
      }
      .logo {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .logo .mark {
        width: 40px;
        height: 40px;
        border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #00d4ff);
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 700;
        color: #061025;
      }
      .title {
        font-size: 18px;
        font-weight: 600;
      }

      .card-panel {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        border-radius: 12px;
        padding: 18px;
        border: 1px solid rgba(255, 255, 255, 0.04);
        box-shadow: 0 6px 24px rgba(2, 6, 23, 0.6);
      }

      .prompt-box {
        display: flex;
        gap: 12px;
        align-items: flex-start;
      }
      textarea#prompt {
        flex: 1;
        min-height: 96px;
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        border-radius: 10px;
        padding: 14px;
        color: inherit;
        font-size: 15px;
        resize: vertical;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.02);
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 10px;
        width: 260px;
      }
      select#model {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        padding: 10px;
        border-radius: 8px;
        color: inherit;
      }
      input[type="file"] {
        color: var(--muted);
      }

      .actions {
        display: flex;
        gap: 10px;
        align-items: center;
      }
      button {
        background: linear-gradient(180deg, var(--btn), #155ce6);
        border: none;
        color: white;
        padding: 10px 14px;
        border-radius: 10px;
        cursor: pointer;
        font-weight: 600;
      }
      button.secondary {
        background: transparent;
        border: 1px solid rgba(255, 255, 255, 0.06);
        color: var(--muted);
        font-weight: 500;
      }

      #status {
        color: var(--muted);
        font-size: 13px;
      }

      #outputs {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px;
        margin-top: 18px;
      }
      .card {
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.02),
          rgba(255, 255, 255, 0.01)
        );
        border-radius: 12px;
        padding: 12px;
        border: 1px solid rgba(255, 255, 255, 0.03);
        box-shadow: 0 8px 20px rgba(2, 6, 23, 0.6);
      }
      .card img {
        width: 100%;
        height: auto;
        border-radius: 8px;
        display: block;
      }

      .meta {
        font-size: 12px;
        color: var(--muted);
        margin-top: 8px;
      }
      .card .controls {
        margin-top: 8px;
        display: flex;
        gap: 8px;
      }
      .card button {
        padding: 8px 10px;
        border-radius: 8px;
        font-size: 13px;
      }

      @media (max-width: 880px) {
        .prompt-box {
          flex-direction: column;
        }
        .controls {
          width: 100%;
          flex-direction: row;
          flex-wrap: wrap;
        }
        select#model {
          flex: 1;
        }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="logo">
          <div class="mark">NB</div>
          <div>
            <div class="title">Nano Banana — Image Studio</div>
            <div style="font-size: 12px; color: var(--muted)">
              Generate images with Nano Banana models
            </div>
          </div>
        </div>
      </div>

      <div class="card-panel">
        <div class="prompt-box">
          <textarea
            id="prompt"
            placeholder="A serene Japanese garden with cherry blossoms, watercolor style..."
          ></textarea>

          <div class="controls">
            <label class="small">Reference image (optional)</label>
            <input id="file" type="file" accept="image/*" />

            <label class="small">Model</label>
            <select id="model">
              <option value="gemini-3.1-flash-image-preview">
                Nano Banana (gemini-3.1-flash)
              </option>
              <option value="gemini-3-pro-image-preview">
                Nano Banana Pro (gemini-3-pro)
              </option>
              <option value="gemini-2.5-flash-image-preview">
                Nano Banana 2 (gemini-2.5-flash)
              </option>
            </select>

            <div style="display: flex; align-items: center; gap: 8px">
              <input id="compare" type="checkbox" />
              <label for="compare" class="small">Compare</label>
            </div>

            <div class="actions">
              <button id="generate">Generate</button>
              <button id="clear" class="secondary">Clear</button>
            </div>

            <div id="status"></div>
          </div>
        </div>
      </div>

      <div id="outputs"></div>
    </div>

    <!-- Puter.js CDN (per Puter tutorial) -->
    <script src="https://js.puter.com/v2/"></script>
    <script>
      const promptEl = document.getElementById("prompt");
      const fileEl = document.getElementById("file");
      const modelEl = document.getElementById("model");
      const btn = document.getElementById("generate");
      const clearBtn = document.getElementById("clear");
      const outputs = document.getElementById("outputs");
      const status = document.getElementById("status");
      const compareCheck = document.getElementById("compare");

      function setStatus(msg, busy = false) {
        status.innerHTML = msg
          ? busy
            ? '<span class="spinner"></span> ' + msg
            : msg
          : "";
      }

      function readFileAsBase64(file) {
        return new Promise((res, rej) => {
          if (!file) return res(null);
          const fr = new FileReader();
          fr.onload = () => {
            // fr.result is data:<mime>;base64,AAAA...
            const str = fr.result || "";
            const comma = str.indexOf(",");
            if (comma >= 0)
              res({
                base64: str.slice(comma + 1),
                mime: str.slice(5, str.indexOf(";")),
              });
            else res({ base64: str, mime: file.type || "image/png" });
          };
          fr.onerror = (e) => rej(e);
          fr.readAsDataURL(file);
        });
      }

      function makeCard(title, imgEl, meta) {
        const div = document.createElement("div");
        div.className = "card";
        const h = document.createElement("h3");
        h.style.margin = "6px 0";
        h.style.fontSize = "14px";
        h.textContent = title;
        div.appendChild(h);
        div.appendChild(imgEl);

        // controls: open, download
        const ctrl = document.createElement("div");
        ctrl.style.marginTop = "8px";
        ctrl.style.display = "flex";
        ctrl.style.gap = "8px";

        const openBtn = document.createElement("button");
        openBtn.textContent = "Open";
        openBtn.onclick = () => {
          const src = imgEl.src;
          if (!src) return;
          window.open(src, "_blank");
        };

        const dlBtn = document.createElement("button");
        dlBtn.textContent = "Download";
        dlBtn.onclick = () => {
          const src = imgEl.src;
          if (!src) return;
          // If data URL, just download directly
          const a = document.createElement("a");
          a.style.display = "none";
          a.href = src;
          // choose extension from mime if available
          let ext = "png";
          if (src.startsWith("data:")) {
            const m = src.match(/^data:([^;]+);/);
            if (m && m[1]) {
              const mime = m[1];
              const parts = mime.split("/");
              ext = parts[1] || ext;
            }
          }
          a.download =
            (title.replace(/[^a-z0-9\-]/gi, "_") || "image") + "." + ext;
          document.body.appendChild(a);
          a.click();
          a.remove();
        };

        ctrl.appendChild(openBtn);
        ctrl.appendChild(dlBtn);

        // metadata/review
        if (meta) {
          const metaDiv = document.createElement("div");
          metaDiv.style.marginTop = "8px";
          metaDiv.style.fontSize = "12px";
          metaDiv.style.color = "#444";
          metaDiv.innerHTML = `Model: <strong>${
            meta.model || "unknown"
          }</strong><br>Prompt: <em style="font-size:12px">${(
            meta.prompt || ""
          ).slice(0, 120)}</em>`;
          if (meta.width && meta.height) {
            metaDiv.innerHTML += `<br>Size: ${meta.width}x${meta.height}`;
          }
          div.appendChild(metaDiv);
        }

        div.appendChild(ctrl);
        return div;
      }

      function isImageElement(obj) {
        return obj && obj.tagName && obj.tagName.toLowerCase() === "img";
      }

      // Try to normalize many possible response shapes into an HTMLImageElement
      function normalizeToImageElement(resp) {
        // If already an image element
        if (isImageElement(resp)) return resp;

        // If it's a string, treat as URL or data URL
        if (typeof resp === "string") {
          const img = document.createElement("img");
          img.src = resp;
          return img;
        }

        // If it's an object, try to find common fields
        const searchForString = (o) => {
          if (!o || typeof o !== "object") return null;
          // direct fields
          const candidates = [
            "src",
            "url",
            "image",
            "data_url",
            "dataUrl",
            "data",
            "b64",
            "base64",
            "b64_json",
            "output_image",
            "output_image_base64",
          ];
          for (const k of candidates) {
            if (k in o) {
              const v = o[k];
              if (typeof v === "string") return v;
              if (Array.isArray(v) && v.length > 0 && typeof v[0] === "string")
                return v[0];
            }
          }
          // nested arrays/objects
          for (const k in o) {
            const v = o[k];
            if (typeof v === "string") return v;
            if (Array.isArray(v)) {
              for (const item of v) {
                const found = searchForString(item);
                if (found) return found;
              }
            } else if (typeof v === "object") {
              const found = searchForString(v);
              if (found) return found;
            }
          }
          return null;
        };

        const found = searchForString(resp);
        if (found) {
          // if it's raw base64 without data:, assume png
          if (/^data:/.test(found)) {
            const img = document.createElement("img");
            img.src = found;
            return img;
          }
          if (/^[A-Za-z0-9+/=\s]+$/.test(found) && found.length > 100) {
            // looks like base64 blob - build data url
            const img = document.createElement("img");
            img.src = "data:image/png;base64," + found.replace(/\s+/g, "");
            return img;
          }
          // otherwise treat as URL
          const img = document.createElement("img");
          img.crossOrigin = "anonymous";
          img.src = found;
          return img;
        }

        // OpenAI-like response where base64 is in data[0].b64_json
        try {
          if (
            resp &&
            resp.data &&
            Array.isArray(resp.data) &&
            resp.data.length > 0
          ) {
            const d0 = resp.data[0];
            if (d0.b64_json && typeof d0.b64_json === "string") {
              const img = document.createElement("img");
              img.src = "data:image/png;base64," + d0.b64_json;
              return img;
            }
          }
        } catch (e) {
          /* ignore */
        }

        // No image found
        const err = new Error(
          "Failed to extract image URL from model response"
        );
        err.details = resp;
        throw err;
      }

      async function generateForModel(prompt, model, inputImageObj) {
        const opts = { model };
        if (inputImageObj) {
          opts.input_image = inputImageObj.base64;
          opts.input_image_mime_type = inputImageObj.mime;
        }

        // puter.ai.txt2img returns a Promise<HTMLImageElement>
        try {
          const img = await puter.ai.txt2img(prompt, opts);
          return img;
        } catch (err) {
          throw err;
        }
      }

      btn.addEventListener("click", async () => {
        const prompt = promptEl.value.trim();
        if (!prompt) {
          setStatus("Please enter a prompt.");
          return;
        }
        setStatus("Generating...", true);
        outputs.innerHTML = "";

        try {
          const file = fileEl.files && fileEl.files[0];
          const inputImageObj = await readFileAsBase64(file);

          const selectedModel = modelEl.value;
          const generateBoth = compareCheck.checked;

          const tasks = [];
          if (generateBoth) {
            tasks.push({
              label: "Nano Banana",
              model: "gemini-3.1-flash-image-preview",
            });
            tasks.push({
              label: "Nano Banana Pro",
              model: "gemini-3-pro-image-preview",
            });
          } else {
            const label = selectedModel.includes("pro")
              ? "Nano Banana Pro"
              : "Nano Banana";
            tasks.push({ label, model: selectedModel });
          }

          for (const t of tasks) {
            setStatus("Generating: " + t.label, true);
            try {
              const resp = await generateForModel(
                prompt,
                t.model,
                inputImageObj
              );
              // Capture raw response for debugging (inspect via debug button)
              try {
                window.__lastModelResponse = resp;
              } catch (e) {}
              // normalize to an <img> element
              let imgEl;
              try {
                imgEl = normalizeToImageElement(resp);
              } catch (normErr) {
                // attach detailed error information
                const errCard = document.createElement("div");
                errCard.className = "card";
                const title = document.createElement("h3");
                title.style.margin = "6px 0";
                title.style.fontSize = "14px";
                title.textContent =
                  t.label + " — " + t.model + " (parsing error)";
                errCard.appendChild(title);
                const pre = document.createElement("pre");
                pre.style.whiteSpace = "pre-wrap";
                pre.style.maxHeight = "220px";
                pre.style.overflow = "auto";
                try {
                  pre.textContent = JSON.stringify(
                    normErr.details || resp || normErr,
                    null,
                    2
                  );
                } catch (e) {
                  pre.textContent = String(normErr.details || resp || normErr);
                }
                errCard.appendChild(pre);
                const copyBtn = document.createElement("button");
                copyBtn.textContent = "Copy error details";
                copyBtn.onclick = () => {
                  try {
                    navigator.clipboard.writeText(pre.textContent);
                  } catch (e) {
                    alert("Copy failed");
                  }
                };
                errCard.appendChild(copyBtn);
                outputs.appendChild(errCard);
                continue; // move to next task
              }

              // attach load listener to capture dimensions for meta
              const meta = { model: t.model, prompt };
              imgEl.onload = () => {
                meta.width = imgEl.naturalWidth;
                meta.height = imgEl.naturalHeight;
              };

              const card = makeCard(t.label + " — " + t.model, imgEl, meta);
              outputs.appendChild(card);
            } catch (err) {
              const errCard = document.createElement("div");
              errCard.className = "card";
              const title = document.createElement("h3");
              title.style.margin = "6px 0";
              title.style.fontSize = "14px";
              title.textContent = t.label + " failed";
              errCard.appendChild(title);

              const pre = document.createElement("pre");
              pre.style.whiteSpace = "pre-wrap";
              pre.style.maxHeight = "220px";
              pre.style.overflow = "auto";
              try {
                if (err && err.details)
                  pre.textContent = JSON.stringify(err.details, null, 2);
                else if (err && err.message)
                  pre.textContent = err.message + "\n" + (err.stack || "");
                else pre.textContent = JSON.stringify(err, null, 2);
              } catch (e) {
                pre.textContent = String(err);
              }
              errCard.appendChild(pre);
              const copyBtn = document.createElement("button");
              copyBtn.textContent = "Copy error details";
              copyBtn.onclick = () => {
                try {
                  navigator.clipboard.writeText(pre.textContent);
                } catch (e) {
                  alert("Copy failed");
                }
              };
              errCard.appendChild(copyBtn);
              outputs.appendChild(errCard);
            }
          }

          setStatus("Done.");
        } catch (e) {
          console.error(e);
          setStatus("Error: " + (e && e.message ? e.message : String(e)));
        }
      });

      clearBtn.addEventListener("click", () => {
        promptEl.value = "";
        fileEl.value = "";
        outputs.innerHTML = "";
        setStatus("");
      });

      // --- Auth helpers: receive notification from `auth_callback.html` (postMessage or storage event)
      function handleAuthNotification(payload) {
        try {
          // payload may be an object or a JSON string
          const p = typeof payload === "string" ? JSON.parse(payload) : payload;
          setStatus(
            "Authentication completed — reloading to pick up session...",
            true
          );
          // cleanup storage marker
          try {
            localStorage.removeItem("putter_auth");
          } catch (e) {}
          // small delay so cookies/localStorage settle, then reload
          setTimeout(() => location.reload(), 600);
        } catch (e) {
          console.warn("Auth notification parsing failed", e);
        }
      }

      // postMessage from popup (preferred when opener exists)
      window.addEventListener("message", (ev) => {
        try {
          if (!ev || !ev.data) return;
          if (ev.data.__putter_auth) {
            handleAuthNotification(ev.data.__putter_auth);
          }
        } catch (e) {
          console.warn(e);
        }
      });

      // storage event for cross-tab notifications (mobile where redirect opens a new tab)
      window.addEventListener("storage", (ev) => {
        try {
          if (!ev) return;
          if (ev.key === "putter_auth" && ev.newValue) {
            handleAuthNotification(JSON.parse(ev.newValue));
          }
        } catch (e) {
          console.warn(e);
        }
      });

      // on load: if the redirect handler already wrote the marker, handle it
      try {
        const existingAuth = localStorage.getItem("putter_auth");
        if (existingAuth) handleAuthNotification(JSON.parse(existingAuth));
      } catch (e) {
        /* ignore */
      }

      // --- Debug UI: show raw model response for troubleshooting ---
      (function () {
        const dbgBtn = document.createElement("button");
        dbgBtn.textContent = "Show debug response";
        dbgBtn.style.position = "fixed";
        dbgBtn.style.right = "12px";
        dbgBtn.style.bottom = "12px";
        dbgBtn.style.padding = "8px 10px";
        dbgBtn.style.zIndex = 9999;
        dbgBtn.style.borderRadius = "8px";
        dbgBtn.style.background = "rgba(0,0,0,0.6)";
        dbgBtn.style.color = "#fff";
        dbgBtn.onclick = () => {
          const raw = window.__lastModelResponse;
          const modal = document.createElement("div");
          modal.style.position = "fixed";
          modal.style.left = 0;
          modal.style.top = 0;
          modal.style.right = 0;
          modal.style.bottom = 0;
          modal.style.background = "rgba(0,0,0,0.6)";
          modal.style.zIndex = 10000;
          modal.style.display = "flex";
          modal.style.alignItems = "center";
          modal.style.justifyContent = "center";
          const box = document.createElement("div");
          box.style.maxWidth = "90%";
          box.style.maxHeight = "80%";
          box.style.overflow = "auto";
          box.style.background = "#071028";
          box.style.padding = "16px";
          box.style.borderRadius = "10px";
          box.style.color = "#e6eef8";
          const pre = document.createElement("pre");
          pre.style.whiteSpace = "pre-wrap";
          pre.style.color = "#d0e6ff";
          pre.style.fontSize = "12px";
          try {
            if (raw === undefined)
              pre.textContent = "[no response captured yet]";
            else
              pre.textContent =
                typeof raw === "string" ? raw : JSON.stringify(raw, null, 2);
          } catch (e) {
            pre.textContent = String(raw);
          }
          const copy = document.createElement("button");
          copy.textContent = "Copy";
          copy.style.marginRight = "8px";
          copy.onclick = () => {
            try {
              navigator.clipboard.writeText(pre.textContent);
              copy.textContent = "Copied";
              setTimeout(() => (copy.textContent = "Copy"), 900);
            } catch (e) {
              alert("copy failed");
            }
          };
          const close = document.createElement("button");
          close.textContent = "Close";
          close.onclick = () => {
            modal.remove();
          };
          const actions = document.createElement("div");
          actions.style.marginTop = "12px";
          actions.appendChild(copy);
          actions.appendChild(close);
          box.appendChild(pre);
          box.appendChild(actions);
          modal.appendChild(box);
          document.body.appendChild(modal);
        };
        document.body.appendChild(dbgBtn);
      })();
    </script>
  </body>
</html>
