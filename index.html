<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Nano Banana Image Generator</title>
    <style>
      :root {
        --bg: #0f1724;
        --panel: #0b1220;
        --muted: #94a3b8;
        --accent: #7c5cff;
        --glass: rgba(255, 255, 255, 0.04);
        --card: #0b1228;
        --btn: #3b82f6;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, "Segoe UI",
          Roboto, "Helvetica Neue", Arial;
        background: linear-gradient(180deg, #071028 0%, #07192b 60%);
        color: #e6eef8;
        -webkit-font-smoothing: antialiased;
      }
      .app { max-width: 1100px; margin: 28px auto; padding: 20px; }
      .topbar { display: flex; align-items: center; gap: 18px; margin-bottom: 18px; }
      .logo { display: flex; align-items: center; gap: 10px; }
      .logo .mark {
        width: 40px; height: 40px; border-radius: 10px;
        background: linear-gradient(135deg, var(--accent), #00d4ff);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; color: #061025;
      }
      .title { font-size: 18px; font-weight: 600; }
      .card-panel {
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
        border-radius: 12px; padding: 18px;
        border: 1px solid rgba(255,255,255,0.04);
        box-shadow: 0 6px 24px rgba(2,6,23,0.6);
      }
      .prompt-box { display: flex; gap: 12px; align-items: flex-start; }
      textarea#prompt {
        flex: 1; min-height: 96px; background: transparent;
        border: 1px solid rgba(255,255,255,0.06); border-radius: 10px;
        padding: 14px; color: inherit; font-size: 15px; resize: vertical;
        box-shadow: inset 0 1px 0 rgba(255,255,255,0.02);
      }
      .controls { display: flex; flex-direction: column; gap: 10px; width: 260px; }
      select#model {
        background: transparent; border: 1px solid rgba(255,255,255,0.06);
        padding: 10px; border-radius: 8px; color: inherit;
      }

      /* ── Multi-image drop zone ── */
      .drop-zone {
        border: 1.5px dashed rgba(255,255,255,0.12);
        border-radius: 8px; padding: 14px 10px; text-align: center;
        cursor: pointer; position: relative;
        transition: border-color 0.2s, background 0.2s;
        font-size: 12px; color: var(--muted);
      }
      .drop-zone:hover, .drop-zone.drag-over {
        border-color: var(--accent);
        background: rgba(124,92,255,0.05);
      }
      .drop-zone input[type="file"] {
        position: absolute; inset: 0; opacity: 0;
        cursor: pointer; width: 100%; height: 100%;
      }
      .drop-zone strong { color: #a5b4fc; }
      #thumb-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
      .thumb-wrap {
        position: relative; width: 56px; height: 56px;
        border-radius: 6px; overflow: hidden;
        border: 1px solid rgba(255,255,255,0.08); flex-shrink: 0;
      }
      .thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; }
      .thumb-wrap .rm {
        position: absolute; top: 2px; right: 2px;
        background: rgba(0,0,0,0.72); border: none; color: #fff;
        border-radius: 50%; width: 16px; height: 16px;
        font-size: 9px; line-height: 16px; text-align: center;
        cursor: pointer; display: none; padding: 0;
      }
      .thumb-wrap:hover .rm { display: block; }
      #merge-note {
        font-size: 11px; color: var(--muted);
        margin-top: 5px; line-height: 1.5; display: none;
      }
      #merge-note span { color: #a5b4fc; }

      .actions { display: flex; gap: 10px; align-items: center; }
      button {
        background: linear-gradient(180deg, var(--btn), #155ce6);
        border: none; color: white; padding: 10px 14px;
        border-radius: 10px; cursor: pointer; font-weight: 600;
      }
      button.secondary {
        background: transparent; border: 1px solid rgba(255,255,255,0.06);
        color: var(--muted); font-weight: 500;
      }
      #status { color: var(--muted); font-size: 13px; }
      #outputs {
        display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
        gap: 14px; margin-top: 18px;
      }
      .card {
        background: linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
        border-radius: 12px; padding: 12px;
        border: 1px solid rgba(255,255,255,0.03);
        box-shadow: 0 8px 20px rgba(2,6,23,0.6);
      }
      .card img { width: 100%; height: auto; border-radius: 8px; display: block; }
      .meta { font-size: 12px; color: var(--muted); margin-top: 8px; }
      .card .controls { margin-top: 8px; display: flex; gap: 8px; }
      .card button { padding: 8px 10px; border-radius: 8px; font-size: 13px; }
      @media (max-width: 880px) {
        .prompt-box { flex-direction: column; }
        .controls { width: 100%; flex-direction: row; flex-wrap: wrap; }
        select#model { flex: 1; }
      }
    </style>
  </head>
  <body>
    <div class="app">
      <div class="topbar">
        <div class="logo">
          <div class="mark">NB</div>
          <div>
            <div class="title">Nano Banana — Image Studio</div>
            <div style="font-size:12px;color:var(--muted)">Generate images with Nano Banana models</div>
          </div>
        </div>
      </div>

      <div class="card-panel">
        <div class="prompt-box">
          <textarea id="prompt" placeholder="A serene Japanese garden with cherry blossoms, watercolor style..."></textarea>

          <div class="controls">
            <label class="small">Reference images (optional, up to 8)</label>
            <div class="drop-zone" id="drop-zone">
              <input type="file" id="file" accept="image/*" multiple />
              <strong>Click or drag</strong> images here
            </div>
            <div id="thumb-grid"></div>
            <div id="merge-note"></div>

            <label class="small">Model</label>
            <select id="model">
              <option value="gemini-3.1-flash-image-preview">Nano Banana (gemini-3.1-flash)</option>
              <option value="gemini-3-pro-image-preview">Nano Banana Pro (gemini-3-pro)</option>
              <option value="gemini-2.5-flash-image-preview">Nano Banana 2 (gemini-2.5-flash)</option>
            </select>

            <div style="display:flex;align-items:center;gap:8px">
              <input id="compare" type="checkbox" />
              <label for="compare" class="small">Compare</label>
            </div>

            <div class="actions">
              <button id="generate">Generate</button>
              <button id="clear" class="secondary">Clear</button>
            </div>

            <div id="status"></div>
          </div>
        </div>
      </div>

      <div id="outputs"></div>
    </div>

    <!-- Hidden canvas used to merge multiple reference images into one -->
    <canvas id="merge-canvas" style="display:none"></canvas>

    <script src="https://js.puter.com/v2/"></script>
    <script>
      // ─── Multi-image state & UI ──────────────────────────────────
      const imgFiles   = []; // Array<File>
      const dropZone   = document.getElementById("drop-zone");
      const fileEl     = document.getElementById("file");
      const thumbGrid  = document.getElementById("thumb-grid");
      const mergeNote  = document.getElementById("merge-note");
      const mergeCanvas = document.getElementById("merge-canvas");

      function addFiles(newFiles) {
        for (const f of newFiles) {
          if (!f.type.startsWith("image/")) continue;
          if (imgFiles.length >= 8) { setStatus("Max 8 reference images allowed."); break; }
          imgFiles.push(f);
          renderThumb(f, imgFiles.length - 1);
        }
        updateMergeNote();
      }

      function renderThumb(file, idx) {
        const wrap = document.createElement("div");
        wrap.className = "thumb-wrap";
        wrap.dataset.idx = idx;
        const img = document.createElement("img");
        img.src = URL.createObjectURL(file);
        img.alt = file.name;
        const rm = document.createElement("button");
        rm.className = "rm"; rm.textContent = "✕"; rm.title = "Remove";
        rm.addEventListener("click", (e) => {
          e.stopPropagation();
          imgFiles.splice(parseInt(wrap.dataset.idx), 1);
          rebuildThumbs();
          updateMergeNote();
        });
        wrap.appendChild(img); wrap.appendChild(rm);
        thumbGrid.appendChild(wrap);
      }

      function rebuildThumbs() {
        thumbGrid.innerHTML = "";
        imgFiles.forEach((f, i) => renderThumb(f, i));
      }

      function updateMergeNote() {
        const n = imgFiles.length;
        if (n === 0) {
          mergeNote.style.display = "none";
        } else if (n === 1) {
          mergeNote.style.display = "block";
          mergeNote.innerHTML = "1 image — sent directly as <span>input_image</span>.";
        } else {
          mergeNote.style.display = "block";
          mergeNote.innerHTML = "<span>" + n + " images</span> → merged into one composite via Canvas API, then sent as <span>input_image</span>.";
        }
      }

      fileEl.addEventListener("change", () => addFiles(fileEl.files));
      dropZone.addEventListener("dragover", (e) => { e.preventDefault(); dropZone.classList.add("drag-over"); });
      dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault(); dropZone.classList.remove("drag-over");
        addFiles(e.dataTransfer.files);
      });

      /**
       * Resolves all imgFiles into a single { base64, mime } object.
       * 1 file  → plain FileReader (original behaviour, preserves mime type).
       * 2+ files → canvas grid stitch → single PNG base64.
       * 0 files → null.
       */
      async function resolveInputImage() {
        if (imgFiles.length === 0) return null;
        if (imgFiles.length === 1) return readFileAsBase64(imgFiles[0]);

        const CELL = 512;
        const COLS = Math.min(imgFiles.length, 4);
        const ROWS = Math.ceil(imgFiles.length / COLS);
        mergeCanvas.width  = COLS * CELL;
        mergeCanvas.height = ROWS * CELL;

        const ctx = mergeCanvas.getContext("2d");
        ctx.fillStyle = "#000";
        ctx.fillRect(0, 0, mergeCanvas.width, mergeCanvas.height);

        const imgs = await Promise.all(imgFiles.map(f => new Promise((res, rej) => {
          const img = new Image();
          img.onload = () => res(img);
          img.onerror = rej;
          img.src = URL.createObjectURL(f);
        })));

        imgs.forEach((img, i) => {
          const col = i % COLS, row = Math.floor(i / COLS);
          const x = col * CELL, y = row * CELL;
          const scale = Math.max(CELL / img.naturalWidth, CELL / img.naturalHeight);
          const sw = img.naturalWidth * scale, sh = img.naturalHeight * scale;
          ctx.drawImage(img, x + (CELL - sw) / 2, y + (CELL - sh) / 2, sw, sh);
        });

        // Subtle separators between cells
        ctx.strokeStyle = "rgba(255,255,255,0.12)"; ctx.lineWidth = 2;
        for (let c = 1; c < COLS; c++) {
          ctx.beginPath(); ctx.moveTo(c * CELL, 0); ctx.lineTo(c * CELL, mergeCanvas.height); ctx.stroke();
        }
        for (let r = 1; r < ROWS; r++) {
          ctx.beginPath(); ctx.moveTo(0, r * CELL); ctx.lineTo(mergeCanvas.width, r * CELL); ctx.stroke();
        }

        const b64 = mergeCanvas.toDataURL("image/png").replace(/^data:image\/png;base64,/, "");
        return { base64: b64, mime: "image/png" };
      }

      // ─── Original helpers (100% unchanged) ──────────────────────
      const promptEl    = document.getElementById("prompt");
      const modelEl     = document.getElementById("model");
      const btn         = document.getElementById("generate");
      const clearBtn    = document.getElementById("clear");
      const outputs     = document.getElementById("outputs");
      const status      = document.getElementById("status");
      const compareCheck = document.getElementById("compare");

      function setStatus(msg, busy = false) {
        status.innerHTML = msg ? (busy ? '<span class="spinner"></span> ' + msg : msg) : "";
      }

      function readFileAsBase64(file) {
        return new Promise((res, rej) => {
          if (!file) return res(null);
          const fr = new FileReader();
          fr.onload = () => {
            const str = fr.result || "";
            const comma = str.indexOf(",");
            if (comma >= 0) res({ base64: str.slice(comma + 1), mime: str.slice(5, str.indexOf(";")) });
            else res({ base64: str, mime: file.type || "image/png" });
          };
          fr.onerror = (e) => rej(e);
          fr.readAsDataURL(file);
        });
      }

      function makeCard(title, imgEl, meta) {
        const div = document.createElement("div"); div.className = "card";
        const h = document.createElement("h3");
        h.style.margin = "6px 0"; h.style.fontSize = "14px"; h.textContent = title;
        div.appendChild(h); div.appendChild(imgEl);
        const ctrl = document.createElement("div");
        ctrl.style.marginTop = "8px"; ctrl.style.display = "flex"; ctrl.style.gap = "8px";
        const openBtn = document.createElement("button");
        openBtn.textContent = "Open";
        openBtn.onclick = () => { const src = imgEl.src; if (!src) return; window.open(src, "_blank"); };
        const dlBtn = document.createElement("button");
        dlBtn.textContent = "Download";
        dlBtn.onclick = () => {
          const src = imgEl.src; if (!src) return;
          const a = document.createElement("a"); a.style.display = "none"; a.href = src;
          let ext = "png";
          if (src.startsWith("data:")) { const m = src.match(/^data:([^;]+);/); if (m && m[1]) ext = m[1].split("/")[1] || ext; }
          a.download = (title.replace(/[^a-z0-9\-]/gi, "_") || "image") + "." + ext;
          document.body.appendChild(a); a.click(); a.remove();
        };
        ctrl.appendChild(openBtn); ctrl.appendChild(dlBtn);
        if (meta) {
          const metaDiv = document.createElement("div");
          metaDiv.style.marginTop = "8px"; metaDiv.style.fontSize = "12px"; metaDiv.style.color = "#444";
          metaDiv.innerHTML = `Model: <strong>${meta.model || "unknown"}</strong><br>Prompt: <em style="font-size:12px">${(meta.prompt || "").slice(0, 120)}</em>`;
          if (meta.width && meta.height) metaDiv.innerHTML += `<br>Size: ${meta.width}x${meta.height}`;
          div.appendChild(metaDiv);
        }
        div.appendChild(ctrl);
        return div;
      }

      function isImageElement(obj) { return obj && obj.tagName && obj.tagName.toLowerCase() === "img"; }

      function normalizeToImageElement(resp) {
        if (isImageElement(resp)) return resp;
        if (typeof resp === "string") { const img = document.createElement("img"); img.src = resp; return img; }
        const searchForString = (o) => {
          if (!o || typeof o !== "object") return null;
          const candidates = ["src","url","image","data_url","dataUrl","data","b64","base64","b64_json","output_image","output_image_base64"];
          for (const k of candidates) {
            if (k in o) { const v = o[k]; if (typeof v === "string") return v; if (Array.isArray(v) && v.length > 0 && typeof v[0] === "string") return v[0]; }
          }
          for (const k in o) {
            const v = o[k];
            if (typeof v === "string") return v;
            if (Array.isArray(v)) { for (const item of v) { const found = searchForString(item); if (found) return found; } }
            else if (typeof v === "object") { const found = searchForString(v); if (found) return found; }
          }
          return null;
        };
        const found = searchForString(resp);
        if (found) {
          const img = document.createElement("img");
          if (/^data:/.test(found)) { img.src = found; return img; }
          if (/^[A-Za-z0-9+/=\s]+$/.test(found) && found.length > 100) { img.src = "data:image/png;base64," + found.replace(/\s+/g, ""); return img; }
          img.crossOrigin = "anonymous"; img.src = found; return img;
        }
        try {
          if (resp && resp.data && Array.isArray(resp.data) && resp.data.length > 0) {
            const d0 = resp.data[0];
            if (d0.b64_json && typeof d0.b64_json === "string") { const img = document.createElement("img"); img.src = "data:image/png;base64," + d0.b64_json; return img; }
          }
        } catch (e) {}
        const err = new Error("Failed to extract image URL from model response"); err.details = resp; throw err;
      }

      async function generateForModel(prompt, model, inputImageObj) {
        const opts = { model };
        if (inputImageObj) { opts.input_image = inputImageObj.base64; opts.input_image_mime_type = inputImageObj.mime; }
        return await puter.ai.txt2img(prompt, opts);
      }

      // ─── Generate (only change: use resolveInputImage instead of readFileAsBase64) ──
      btn.addEventListener("click", async () => {
        const prompt = promptEl.value.trim();
        if (!prompt) { setStatus("Please enter a prompt."); return; }
        setStatus("Generating...", true);
        outputs.innerHTML = "";

        try {
          const n = imgFiles.length;
          if (n > 1) setStatus("Merging " + n + " images via Canvas…", true);
          const inputImageObj = await resolveInputImage(); // ← only change to original flow

          const selectedModel = modelEl.value;
          const generateBoth  = compareCheck.checked;
          const tasks = [];
          if (generateBoth) {
            tasks.push({ label: "Nano Banana",     model: "gemini-3.1-flash-image-preview" });
            tasks.push({ label: "Nano Banana Pro", model: "gemini-3-pro-image-preview" });
          } else {
            tasks.push({ label: selectedModel.includes("pro") ? "Nano Banana Pro" : "Nano Banana", model: selectedModel });
          }

          for (const t of tasks) {
            setStatus("Generating: " + t.label, true);
            try {
              const resp = await generateForModel(prompt, t.model, inputImageObj);
              try { window.__lastModelResponse = resp; } catch (e) {}
              let imgEl;
              try {
                imgEl = normalizeToImageElement(resp);
              } catch (normErr) {
                const errCard = document.createElement("div"); errCard.className = "card";
                const title = document.createElement("h3"); title.style.margin = "6px 0"; title.style.fontSize = "14px";
                title.textContent = t.label + " — " + t.model + " (parsing error)"; errCard.appendChild(title);
                const pre = document.createElement("pre"); pre.style.whiteSpace = "pre-wrap"; pre.style.maxHeight = "220px"; pre.style.overflow = "auto";
                try { pre.textContent = JSON.stringify(normErr.details || resp || normErr, null, 2); } catch (e) { pre.textContent = String(normErr.details || resp || normErr); }
                errCard.appendChild(pre);
                const copyBtn = document.createElement("button"); copyBtn.textContent = "Copy error details";
                copyBtn.onclick = () => { try { navigator.clipboard.writeText(pre.textContent); } catch (e) { alert("Copy failed"); } };
                errCard.appendChild(copyBtn); outputs.appendChild(errCard); continue;
              }
              const meta = { model: t.model, prompt };
              imgEl.onload = () => { meta.width = imgEl.naturalWidth; meta.height = imgEl.naturalHeight; };
              outputs.appendChild(makeCard(t.label + " — " + t.model, imgEl, meta));
            } catch (err) {
              const errCard = document.createElement("div"); errCard.className = "card";
              const title = document.createElement("h3"); title.style.margin = "6px 0"; title.style.fontSize = "14px";
              title.textContent = t.label + " failed"; errCard.appendChild(title);
              const pre = document.createElement("pre"); pre.style.whiteSpace = "pre-wrap"; pre.style.maxHeight = "220px"; pre.style.overflow = "auto";
              try {
                if (err && err.details) pre.textContent = JSON.stringify(err.details, null, 2);
                else if (err && err.message) pre.textContent = err.message + "\n" + (err.stack || "");
                else pre.textContent = JSON.stringify(err, null, 2);
              } catch (e) { pre.textContent = String(err); }
              errCard.appendChild(pre);
              const copyBtn = document.createElement("button"); copyBtn.textContent = "Copy error details";
              copyBtn.onclick = () => { try { navigator.clipboard.writeText(pre.textContent); } catch (e) { alert("Copy failed"); } };
              errCard.appendChild(copyBtn); outputs.appendChild(errCard);
            }
          }
          setStatus("Done.");
        } catch (e) {
          console.error(e);
          setStatus("Error: " + (e && e.message ? e.message : String(e)));
        }
      });

      clearBtn.addEventListener("click", () => {
        promptEl.value = ""; fileEl.value = "";
        imgFiles.length = 0; thumbGrid.innerHTML = "";
        mergeNote.style.display = "none";
        outputs.innerHTML = ""; setStatus("");
      });

      // ─── Auth helpers (100% unchanged from original) ─────────────
      function handleAuthNotification(payload) {
        try {
          const p = typeof payload === "string" ? JSON.parse(payload) : payload;
          setStatus("Authentication completed — reloading to pick up session...", true);
          try { localStorage.removeItem("putter_auth"); } catch (e) {}
          setTimeout(() => location.reload(), 600);
        } catch (e) { console.warn("Auth notification parsing failed", e); }
      }

      window.addEventListener("message", (ev) => {
        try { if (!ev || !ev.data) return; if (ev.data.__putter_auth) handleAuthNotification(ev.data.__putter_auth); }
        catch (e) { console.warn(e); }
      });

      window.addEventListener("storage", (ev) => {
        try { if (!ev) return; if (ev.key === "putter_auth" && ev.newValue) handleAuthNotification(JSON.parse(ev.newValue)); }
        catch (e) { console.warn(e); }
      });

      try { const existingAuth = localStorage.getItem("putter_auth"); if (existingAuth) handleAuthNotification(JSON.parse(existingAuth)); } catch (e) {}

      // ─── Debug UI (100% unchanged from original) ─────────────────
      (function () {
        const dbgBtn = document.createElement("button");
        dbgBtn.textContent = "Show debug response";
        dbgBtn.style.cssText = "position:fixed;right:12px;bottom:12px;padding:8px 10px;z-index:9999;border-radius:8px;background:rgba(0,0,0,0.6);color:#fff;";
        dbgBtn.onclick = () => {
          const raw = window.__lastModelResponse;
          const modal = document.createElement("div");
          modal.style.cssText = "position:fixed;left:0;top:0;right:0;bottom:0;background:rgba(0,0,0,0.6);z-index:10000;display:flex;align-items:center;justify-content:center;";
          const box = document.createElement("div");
          box.style.cssText = "max-width:90%;max-height:80%;overflow:auto;background:#071028;padding:16px;border-radius:10px;color:#e6eef8;";
          const pre = document.createElement("pre");
          pre.style.cssText = "white-space:pre-wrap;color:#d0e6ff;font-size:12px;";
          try { pre.textContent = raw === undefined ? "[no response captured yet]" : (typeof raw === "string" ? raw : JSON.stringify(raw, null, 2)); }
          catch (e) { pre.textContent = String(raw); }
          const copy = document.createElement("button"); copy.textContent = "Copy"; copy.style.marginRight = "8px";
          copy.onclick = () => { try { navigator.clipboard.writeText(pre.textContent); copy.textContent = "Copied"; setTimeout(() => (copy.textContent = "Copy"), 900); } catch (e) { alert("copy failed"); } };
          const close = document.createElement("button"); close.textContent = "Close"; close.onclick = () => modal.remove();
          const actions = document.createElement("div"); actions.style.marginTop = "12px";
          actions.appendChild(copy); actions.appendChild(close);
          box.appendChild(pre); box.appendChild(actions); modal.appendChild(box); document.body.appendChild(modal);
        };
        document.body.appendChild(dbgBtn);
      })();
    </script>
  </body>
</html>
